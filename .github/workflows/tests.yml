# CI: automatyczne uruchamianie testów przy każdym pushu i pull requeście do main.
# Dwa joby: szybki gate na SQLite (z raportem pokrycia) oraz pełny pakiet na
# PostgreSQL (wykrywa rozjazdy zachowań SQLite vs Postgres — patrz CLAUDE.md).
name: Testy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  testy-sqlite:
    name: pytest (SQLite + pokrycie)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Instalacja zależności
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Testy z raportem pokrycia
        run: |
          pytest --cov=app --cov-report=term-missing

  testy-postgres:
    name: pytest (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: budget_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/budget_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Instalacja zależności
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Testy na PostgreSQL
        run: |
          pytest

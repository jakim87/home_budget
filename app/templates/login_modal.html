<!-- Login Modal -->
<div id="login-modal" class="hidden fixed inset-0 bg-slate-900/80 flex items-center justify-center z-[100] backdrop-blur-sm">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm">
        <h2 class="text-2xl font-bold text-slate-800 text-center mb-2">Witaj w aplikacji!</h2>
        <p class="text-slate-500 text-center mb-6">Zaloguj się, aby kontynuować.</p>
        <form id="login-form">
            <div class="mb-4">
                <label for="login-username" class="block text-sm font-medium text-slate-700 mb-1">Nazwa użytkownika lub e-mail</label>
                <input type="text" id="login-username" value="default_user" required class="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm bg-white">
            </div>
            <div class="mb-6">
                <label for="login-password" class="block text-sm font-medium text-slate-700 mb-1">Hasło</label>
                <input type="password" id="login-password" value="password" required class="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm bg-white">
                <p id="login-error" class="text-rose-500 text-sm mt-2 hidden"></p>
            </div>
            <button type="submit" class="w-full px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg transition-all shadow-lg focus:ring-4 focus:ring-blue-300">Zaloguj się</button>
        </form>
    </div>
</div>
